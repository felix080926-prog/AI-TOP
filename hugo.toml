baseURL = "https://felix080926-prog.github.io/AI-TOP/"
languageCode = "zh-cn"
title = "AI 开源雷达"
theme = "PaperMod"
[pagination]
  pagerSize = 9
enableEmoji = true

[params]
  env = "production"
  description = "每日精选 AI 开源项目，涵盖编程、Agent、多模态、部署、知识工具五大方向"
  author = "雷达君"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true

  [params.label]
    iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28"><defs><linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#06d6a0"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs><circle cx="50" cy="50" r="46" fill="none" stroke="url(#r)" stroke-width="1.5" opacity="0.3"/><circle cx="50" cy="50" r="30" fill="none" stroke="url(#r)" stroke-width="1" opacity="0.2"/><circle cx="50" cy="50" r="14" fill="none" stroke="url(#r)" stroke-width="0.8" opacity="0.15"/><path d="M50 50 L50 14 A36 36 0 0 1 76 34 Z" fill="url(#r)" opacity="0.45"/><circle cx="50" cy="50" r="4" fill="#06d6a0" opacity="0.9"/><circle cx="62" cy="28" r="2" fill="#06d6a0" opacity="0.7"/><circle cx="70" cy="44" r="1.5" fill="#a78bfa" opacity="0.5"/></svg>'
    iconHeight = 28
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  ShowFullTextinRSS = true
  comments = false

  [params.homeInfoParams]
    Title = "AI 开源雷达"
    Content = "每日精选一个 GitHub 开源 AI 项目，帮你发现下一个改变游戏规则的工具。涵盖 AI 编程、Agent 智能体、多模态创作、本地部署、知识工具五大方向。"

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/felix080926-prog/AI-TOP"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 20

  [[menu.main]]
    identifier = "projects"
    name = "GitHub 项目"
    url = "/projects/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "关于我"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
